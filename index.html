<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZUKO-MD | Pair & Deploy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060c);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .glass-container {
      max-width: 800px;
      width: 100%;
      background: rgba(8, 12, 22, 0.75);
      backdrop-filter: blur(14px);
      border-radius: 2rem;
      border: 1px solid rgba(0, 255, 255, 0.25);
      padding: 2.5rem;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #E0F2FE, #5EE6FF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }

    .sub {
      color: #9aaec5;
      margin-bottom: 2rem;
    }

    .button-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0;
    }

    .btn {
      padding: 1rem 1.8rem;
      background: rgba(12, 18, 28, 0.9);
      border-radius: 60px;
      border: 1px solid #2c5366;
      color: #eef5ff;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn:hover {
      border-color: #6ee7ff;
      transform: translateY(-3px);
      box-shadow: 0 0 16px rgba(0, 200, 255, 0.3);
    }

    .btn-primary {
      border-color: #3dbbd9;
    }

    .footer-links {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(72, 187, 255, 0.2);
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }

    .footer-links a {
      color: #aac8e0;
      text-decoration: none;
    }

    .footer-links a:hover {
      color: #9efff0;
    }
  </style>
</head>
<body>
<div class="glass-container">
  <h1>🔥 ZUKO-MD 🔥</h1>
  <div class="sub">Advanced WhatsApp Bot • Multi-Device Pairing</div>
  
  <div class="button-grid">
    <a href="/pair" class="btn btn-primary">🔑 Pair Code</a>
    <a href="/qr" class="btn">📱 QR Code</a>
    <a href="https://github.com/felixbassey467/ZUKO-MD" target="_blank" class="btn">📂 GitHub</a>
    <a href="https://chat.whatsapp.com/DdZI3H1EFeOJs9TCIyVyXa" target="_blank" class="btn">💬 Group</a>
  </div>
  
  <div class="footer-links">
    <a href="https://github.com/felixbassey467/ZUKO-MD">⭐ Star on GitHub</a>
    <a href="https://wa.me/2349079055953">📞 Contact Support</a>
  </div>
</div>
</body>
</html>
