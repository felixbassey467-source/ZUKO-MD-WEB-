<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZUKO-MD | WhatsApp Linker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f97316;
      --primary-dark: #ea580c;
      --primary-light: #fed7aa;
      --bg-dark: #0a0a0a;
      --bg-card: #111111;
      --bg-elevated: #1a1a1a;
      --text-primary: #ffffff;
      --text-secondary: #a3a3a3;
      --border: #2a2a2a;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
      --glow: rgba(249, 115, 22, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated Background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(249, 115, 22, 0.05) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(249, 115, 22, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: var(--bg-card);
      border-radius: 32px;
      padding: 32px;
      border: 1px solid var(--border);
      position: relative;
      z-index: 1;
      backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: translateY(-5px);
    }

    /* Header Section */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: white;
      box-shadow: 0 8px 32px var(--glow);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 8px 32px var(--glow);
      }
      50% {
        box-shadow: 0 8px 48px rgba(249, 115, 22, 0.5);
      }
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    /* Social Icons */
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .social-icons a {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      text-decoration: none;
      transition: all 0.3s ease;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
    }

    .social-icons a.youtube:hover { background: #FF0000; transform: translateY(-3px); border-color: #FF0000; }
    .social-icons a.telegram:hover { background: #0088cc; transform: translateY(-3px); border-color: #0088cc; }
    .social-icons a.whatsapp:hover { background: #25D366; transform: translateY(-3px); border-color: #25D366; }
    .social-icons a.github:hover { background: #333; transform: translateY(-3px); border-color: #333; }

    /* Toggle Switch */
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      background: var(--bg-elevated);
      border-radius: 60px;
      padding: 4px;
      border: 1px solid var(--border);
    }

    .toggle-option {
      flex: 1;
      padding: 12px 20px;
      text-align: center;
      cursor: pointer;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      color: var(--text-secondary);
    }

    .toggle-option i {
      margin-right: 8px;
    }

    .toggle-option.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 4px 12px var(--glow);
    }

    .toggle-option:not(.active):hover {
      color: var(--primary);
      background: rgba(249, 115, 22, 0.1);
    }

    /* Input Group */
    .input-group {
      margin-bottom: 24px;
      transition: all 0.3s ease;
    }

    .input-group.hidden {
      display: none;
    }

    .input-label {
      display: block;
      margin-bottom: 10px;
      font-weight: 500;
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      background: var(--bg-elevated);
      color: var(--text-primary);
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .input-field::placeholder {
      color: var(--text-secondary);
      opacity: 0.5;
    }

    /* Generate Button */
    .generate-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--glow);
    }

    .generate-btn.hidden {
      display: none;
    }

    /* Code Display */
    .code-display {
      background: var(--bg-elevated);
      padding: 16px;
      border-radius: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      font-family: 'Monaco', 'Courier New', monospace;
      letter-spacing: 1px;
    }

    /* QR Display */
    .qr-display {
      background: var(--bg-elevated);
      padding: 24px;
      border-radius: 24px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      display: none;
    }

    .qr-image {
      max-width: 260px;
      max-height: 260px;
      margin: 0 auto 20px;
      border-radius: 20px;
      background: white;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .qr-instructions {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .qr-instructions i {
      color: var(--primary);
      margin-right: 6px;
    }

    /* Copy Button */
    .copy-btn {
      width: 100%;
      padding: 12px;
      background: var(--bg-elevated);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-primary);
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      border-color: var(--primary);
      background: rgba(249, 115, 22, 0.1);
    }

    /* Messages */
    .success-message {
      color: var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 600;
    }

    .error-message {
      color: var(--error);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 14px;
    }

    /* Loading Spinner */
    .loading {
      display: none;
      text-align: center;
      margin: 20px 0;
    }

    .loading i {
      font-size: 28px;
      color: var(--primary);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-secondary);
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 24px;
        border-radius: 24px;
      }

      .title {
        font-size: 24px;
      }

      .logo {
        width: 70px;
        height: 70px;
        font-size: 30px;
      }

      .code-display {
        font-size: 14px;
        padding: 14px;
      }

      .qr-image {
        max-width: 200px;
        max-height: 200px;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-elevated);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary-dark);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo"><i class="fas fa-fire"></i></div>
      <h1 class="title">ZUKO-MD</h1>
      <p class="subtitle">Next Generation WhatsApp Linker</p>
      <div class="social-icons">
        <a href="https://www.youtube.com/@ZUKO-MD001?sub_confirmation=1" target="_blank" class="youtube"><i class="fab fa-youtube"></i></a>
        <a href="https://t.me/+R_tQHIfp8jY3Zjc0" target="_blank" class="telegram"><i class="fab fa-telegram-plane"></i></a>
        <a href="https://whatsapp.com/channel/0029VbCUOf389inrrurd6n1z" target="_blank" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
        <a href="https://github.com/Neggy5/ZUKO-MD" target="_blank" class="github"><i class="fab fa-github"></i></a>
      </div>
    </div>

    <!-- Toggle Switch -->
    <div class="toggle-container">
      <div class="toggle-option active" data-mode="pair">
        <i class="fas fa-key"></i> Pair Code
      </div>
      <div class="toggle-option" data-mode="qr">
        <i class="fas fa-qrcode"></i> QR Code
      </div>
    </div>

    <div class="input-group" id="inputGroup">
      <label class="input-label"><i class="fas fa-phone-alt"></i> WhatsApp Number (with country code)</label>
      <input type="text" id="mobileNumber" class="input-field" placeholder="+2349079055953" pattern="[+][0-9]{10,}" title="Please enter country code starting with + followed by number">
    </div>

    <button class="generate-btn" id="submit">
      <i class="fas fa-key"></i> Generate Pair Code
    </button>

    <div class="loading" id="loading">
      <i class="fas fa-spinner"></i>
    </div>

    <div class="code-display" id="codeDisplay">
      <i class="fas fa-link"></i> Ready to connect
    </div>

    <div class="qr-display" id="qrDisplay">
      <img id="qrImage" class="qr-image" src="" alt="QR Code">
      <div class="qr-instructions" id="qrInstructions">
        <i class="fas fa-mobile-alt"></i> Scan with WhatsApp to connect
      </div>
    </div>

    <button class="copy-btn" id="copy" onclick="copyCode()">
      <i class="fas fa-copy"></i> Copy Code
    </button>

    <div class="footer">
      <p>© 2025 <a href="https://github.com/Neggy5">King Zuko</a> | ZUKO-MD v2.0</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    let currentMode = 'pair';

    // Toggle functionality
    document.querySelectorAll('.toggle-option').forEach(option => {
      option.addEventListener('click', function() {
        const mode = this.dataset.mode;
        if (mode === currentMode) return;

        // Update active state
        document.querySelectorAll('.toggle-option').forEach(opt => opt.classList.remove('active'));
        this.classList.add('active');

        // Update mode
        currentMode = mode;

        // Update button and input visibility
        const submitBtn = document.getElementById('submit');
        const inputGroup = document.getElementById('inputGroup');
        
        if (mode === 'pair') {
          submitBtn.innerHTML = '<i class="fas fa-key"></i> Generate Pair Code';
          submitBtn.classList.remove('hidden');
          inputGroup.classList.remove('hidden');
        } else {
          submitBtn.classList.add('hidden');
          inputGroup.classList.add('hidden');
          // Auto-generate QR code when QR mode is selected
          generateQRCode();
        }

        // Clear displays
        document.getElementById('codeDisplay').innerHTML = '<i class="fas fa-link"></i> Ready to connect';
        document.getElementById('qrDisplay').style.display = 'none';
        document.getElementById('codeDisplay').style.display = 'flex';
      });
    });

    async function generateQRCode() {
      const codeDisplay = document.getElementById("codeDisplay");
      const qrDisplay = document.getElementById("qrDisplay");
      const loadingSpinner = document.getElementById("loading");

      loadingSpinner.style.display = "block";
      codeDisplay.innerHTML = '';
      qrDisplay.style.display = 'none';

      try {
        const response = await axios('/qr');
        
        if (response.data.qr) {
          document.getElementById('qrImage').src = response.data.qr;
          document.getElementById('qrInstructions').innerHTML = '<i class="fas fa-mobile-alt"></i> ' + (response.data.instructions?.join(' • ') || 'Scan with WhatsApp to connect');
          qrDisplay.style.display = 'block';
          codeDisplay.style.display = 'none';
        } else {
          codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Failed to generate QR code</div>';
          codeDisplay.style.display = 'flex';
        }
      } catch (error) {
        console.error("Error generating QR code:", error);
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Error generating QR code. Please try again.</div>';
        codeDisplay.style.display = 'flex';
      } finally {
        loadingSpinner.style.display = "none";
      }
    }

    document.getElementById("submit").addEventListener("click", async (e) => {
      e.preventDefault();
      
      const mobileNumberInput = document.getElementById("mobileNumber");
      const codeDisplay = document.getElementById("codeDisplay");
      const qrDisplay = document.getElementById("qrDisplay");
      const loadingSpinner = document.getElementById("loading");

      const mobileNumber = mobileNumberInput.value.trim();
      if (!mobileNumber) {
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Please enter your WhatsApp number</div>';
        return;
      }

      loadingSpinner.style.display = "block";
      codeDisplay.innerHTML = '';
      qrDisplay.style.display = 'none';

      try {
        const response = await axios(`/pair?number=${mobileNumber.replace(/[^0-9]/g, "")}`);
        
        const code = response.data.code || "Service Unavailable";
        if (code === "Service Unavailable") {
          codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Service Unavailable</div>';
        } else {
          codeDisplay.innerHTML = `<div class="success-message"><i class="fas fa-check-circle"></i> ${code}</div>`;
        }
        codeDisplay.style.display = 'flex';
      } catch (error) {
        console.error("Error generating code:", error);
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Error generating code. Please try again.</div>';
        codeDisplay.style.display = 'flex';
      } finally {
        loadingSpinner.style.display = "none";
      }
    });
    
    function copyCode() {
      const codeDisplay = document.getElementById("codeDisplay").innerText;
      const code = codeDisplay.replace(/[^0-9-]/g, '');
      navigator.clipboard.writeText(code).then(() => {
        const copyBtn = document.getElementById("copy");
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        setTimeout(() => {
          copyBtn.innerHTML = originalText;
        }, 2000);
      }).catch(err => {
        console.error("Failed to copy text: ", err);
      });
    }
  </script>
</body>
</html>
