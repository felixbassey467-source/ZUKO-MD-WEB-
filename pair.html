<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZUKO-MD | WhatsApp Linker Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      width: 100%;
      background: rgba(20, 20, 30, 0.95);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(249,115,22,0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 40px;
      color: white;
    }

    h1 {
      color: #f97316;
      font-size: 28px;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
    }

    .toggle-container {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      background: #2a2a2a;
      border-radius: 50px;
      padding: 5px;
    }

    .toggle-btn {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      border-radius: 50px;
      transition: all 0.3s;
      color: #aaa;
      font-weight: 600;
    }

    .toggle-btn.active {
      background: #f97316;
      color: white;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group.hidden {
      display: none;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #aaa;
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 10px;
      color: white;
      font-size: 16px;
    }

    input:focus {
      outline: none;
      border-color: #f97316;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 15px;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(249,115,22,0.4);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .result {
      background: #2a2a2a;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      margin-bottom: 15px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      word-break: break-all;
    }

    .qr-container {
      text-align: center;
      margin-bottom: 15px;
      display: none;
    }

    .qr-image {
      max-width: 200px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      margin: 0 auto;
    }

    .copy-btn {
      background: #2a2a2a;
      margin-top: 10px;
    }

    .copy-btn:hover {
      background: #3a3a3a;
      transform: none;
    }

    .footer {
      text-align: center;
      color: #666;
      font-size: 12px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #2a2a2a;
    }

    .loading {
      text-align: center;
      margin: 20px 0;
      display: none;
    }

    .spinner {
      animation: spin 1s linear infinite;
      font-size: 30px;
      color: #f97316;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .success {
      color: #22c55e;
    }

    .error {
      color: #ef4444;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #2a2a2a;
      padding: 12px 20px;
      border-radius: 10px;
      border-left: 4px solid #f97316;
      transform: translateX(400px);
      transition: transform 0.3s;
      z-index: 1000;
    }

    .toast.show {
      transform: translateX(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <i class="fas fa-fire"></i>
      </div>
      <h1>ZUKO-MD</h1>
      <p class="subtitle">ultimate WhatsApp linker · encrypted pairing system</p>
    </div>

    <div class="toggle-container">
      <div class="toggle-btn active" data-mode="pair">
        <i class="fas fa-key"></i> Pair Code
      </div>
      <div class="toggle-btn" data-mode="qr">
        <i class="fas fa-qrcode"></i> QR Scan
      </div>
    </div>

    <div class="input-group" id="inputGroup">
      <label><i class="fas fa-phone"></i> WHATSAPP NUMBER (WITH COUNTRY CODE)</label>
      <input type="tel" id="phoneNumber" placeholder="+2349079055953" value="+2349079055953">
    </div>

    <button id="generateBtn">
      <i class="fas fa-link"></i> Generate Pair Code
    </button>

    <div class="loading" id="loading">
      <i class="fas fa-spinner spinner"></i>
      <p style="margin-top: 10px; color: #888;">Connecting to server...</p>
    </div>

    <div class="result" id="result">
      <i class="fas fa-plug"></i> Ready to connect
    </div>

    <div class="qr-container" id="qrContainer">
      <img id="qrImage" class="qr-image" alt="QR Code">
      <p style="margin-top: 10px; color: #888;">Scan with WhatsApp to connect</p>
    </div>

    <button class="copy-btn" id="copyBtn" style="display: none;">
      <i class="fas fa-copy"></i> Copy pairing code
    </button>

    <div class="footer">
      <p>end-to-end encrypted · ZUKO v2.0 · instant notifications</p>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    let currentMode = 'pair';
    const API_BASE = window.location.origin;

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
      toast.style.borderLeftColor = isError ? '#ef4444' : '#22c55e';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    // Toggle functionality
    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.dataset.mode;
        if (mode === currentMode) return;
        
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = mode;
        
        const inputGroup = document.getElementById('inputGroup');
        const generateBtn = document.getElementById('generateBtn');
        const resultDiv = document.getElementById('result');
        const qrContainer = document.getElementById('qrContainer');
        const copyBtn = document.getElementById('copyBtn');
        
        if (mode === 'pair') {
          inputGroup.classList.remove('hidden');
          generateBtn.style.display = 'flex';
          generateBtn.innerHTML = '<i class="fas fa-key"></i> Generate Pair Code';
          qrContainer.style.display = 'none';
          resultDiv.style.display = 'flex';
          copyBtn.style.display = 'flex';
          resultDiv.innerHTML = '<i class="fas fa-plug"></i> Enter your number';
        } else {
          inputGroup.classList.add('hidden');
          generateBtn.style.display = 'none';
          resultDiv.style.display = 'none';
          copyBtn.style.display = 'none';
          qrContainer.style.display = 'block';
          generateQRCode();
        }
      });
    });

    async function generateQRCode() {
      const qrImage = document.getElementById('qrImage');
      const loading = document.getElementById('loading');
      
      loading.style.display = 'block';
      try {
        const response = await fetch(`${API_BASE}/qr`);
        const data = await response.json();
        
        if (data.success && data.qr) {
          qrImage.src = data.qr;
          showToast('QR Code generated! Scan with WhatsApp', false);
        } else {
          throw new Error('Invalid QR data');
        }
      } catch (error) {
        console.error('QR Error:', error);
        showToast('Failed to generate QR code. Check server connection.', true);
        qrImage.src = 'https://via.placeholder.com/200?text=QR+Error';
      } finally {
        loading.style.display = 'none';
      }
    }

    async function generatePairCode() {
      const phoneInput = document.getElementById('phoneNumber');
      const phone = phoneInput.value.trim();
      
      if (!phone) {
        showToast('Please enter your WhatsApp number', true);
        return;
      }
      
      const generateBtn = document.getElementById('generateBtn');
      const resultDiv = document.getElementById('result');
      const loading = document.getElementById('loading');
      
      generateBtn.disabled = true;
      loading.style.display = 'block';
      resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating pairing code...';
      
      try {
        const cleanNumber = phone.replace(/[^0-9]/g, '');
        console.log(`Sending request to: ${API_BASE}/pair?number=${cleanNumber}`);
        
        const response = await fetch(`${API_BASE}/pair?number=${cleanNumber}`, {
          method: 'GET',
          headers: {
            'Accept': 'application/json',
          }
        });
        
        const data = await response.json();
        console.log('Server response:', data);
        
        if (response.ok && data.success) {
          resultDiv.innerHTML = `<div class="success"><i class="fas fa-check-circle"></i> 🔗 ${data.code}</div>`;
          showToast(`Pairing code generated! Check your WhatsApp: ${data.code}`, false);
          
          // Store code for copying
          window.currentCode = data.code;
          
          // Auto copy to clipboard
          navigator.clipboard.writeText(data.code).then(() => {
            console.log('Code copied to clipboard');
          });
        } else {
          throw new Error(data.message || 'Failed to generate code');
        }
      } catch (error) {
        console.error('Pairing error:', error);
        let errorMsg = 'network error · check connection';
        
        if (error.message.includes('Failed to fetch')) {
          errorMsg = '⚠️ Cannot connect to server. Make sure the backend is running on port 8000';
        } else if (error.message) {
          errorMsg = error.message;
        }
        
        resultDiv.innerHTML = `<div class="error"><i class="fas fa-exclamation-triangle"></i> ${errorMsg}</div>`;
        showToast(`❌ ${errorMsg}`, true);
      } finally {
        generateBtn.disabled = false;
        loading.style.display = 'none';
      }
    }

    // Copy button functionality
    document.getElementById('copyBtn').addEventListener('click', () => {
      if (window.currentCode) {
        navigator.clipboard.writeText(window.currentCode).then(() => {
          showToast('Code copied to clipboard!', false);
        }).catch(() => {
          showToast('Failed to copy', true);
        });
      }
    });

    // Generate button click
    document.getElementById('generateBtn').addEventListener('click', generatePairCode);
    
    // Test server connection on load
    async function testConnection() {
      try {
        const response = await fetch(`${API_BASE}/pair?number=1234567890`);
        console.log('Server connection test:', response.status);
      } catch (error) {
        console.error('Server not reachable:', error);
        showToast('⚠️ Cannot connect to server. Make sure backend is running on port 8000', true);
      }
    }
    
    testConnection();
  </script>
</body>
</html>
