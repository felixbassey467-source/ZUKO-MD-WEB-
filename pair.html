<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ZUKO-MD • Pairing Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
      background: radial-gradient(ellipse at 30% 40%, #0a0f1f, #010101);
      position: relative;
      padding: 1.5rem;
    }

    /* animated dark tech background */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cGF0aCBmaWxsPSIjMjIyYzQwIiBmaWxsLW9wYWNpdHk9IjAuMTUiIGQ9Ik0wIDBoNDB2NDBIMHoiLz48cGF0aCBzdHJva2U9IiMwMGZmZTAiIHN0cm9rZS13aWR0aD0iMC4zIiBkPSJNMTAgMTBoMjB2MjBIMTB6Ii8+PC9zdmc+');
      background-repeat: repeat;
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
    }

    /* main card - glassmorphic dark theme */
    .zuk-card {
      max-width: 500px;
      width: 100%;
      background: rgba(6, 10, 20, 0.75);
      backdrop-filter: blur(18px);
      border-radius: 2.5rem;
      border: 1px solid rgba(0, 255, 255, 0.25);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 210, 210, 0.1) inset;
      padding: 2rem 1.8rem;
      transition: all 0.3s ease;
      z-index: 2;
      position: relative;
    }

    /* header with lightning badge */
    .zuk-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 180, 210, 0.18);
      backdrop-filter: blur(4px);
      padding: 0.3rem 1.2rem;
      border-radius: 60px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #8efff5;
      border: 0.5px solid #2affdd40;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(125deg, #c0f2ff, #7b92ff, #ad6eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px rgba(0, 230, 250, 0.3);
      letter-spacing: -0.5px;
      margin-bottom: 0.3rem;
    }

    .tagline {
      color: #8da3c9;
      font-size: 0.85rem;
      font-weight: 400;
      border-bottom: 1px dashed #2c677a;
      display: inline-block;
      padding-bottom: 0.4rem;
    }

    /* session scanner area */
    .session-area {
      margin: 1.5rem 0 1rem;
    }

    .info-badge {
      background: #0e1625cc;
      border-radius: 1.5rem;
      padding: 0.6rem 1rem;
      text-align: center;
      margin-bottom: 1.8rem;
      border-left: 3px solid #0ff;
    }

    .info-badge i {
      color: #2effe0;
      margin-right: 8px;
    }

    .info-badge span {
      color: #c7e2ff;
      font-size: 0.8rem;
      font-weight: 500;
    }

    /* stylish input container */
    .input-group {
      background: #0b0f1c;
      border-radius: 2rem;
      padding: 0.2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #2c4c6e;
      transition: all 0.2s;
    }

    .input-group:focus-within {
      border-color: #3effe6;
      box-shadow: 0 0 12px rgba(0, 255, 230, 0.3);
    }

    .input-group input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 1rem 1.2rem;
      font-size: 1rem;
      color: #eef5ff;
      font-weight: 500;
      outline: none;
      letter-spacing: 0.5px;
    }

    .input-group input::placeholder {
      color: #6e7d9e;
      font-weight: 400;
      font-size: 0.85rem;
    }

    .input-group button {
      background: linear-gradient(105deg, #1e2a4a, #0f1a30);
      border: none;
      padding: 0.8rem 1.8rem;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 0.9rem;
      color: #dafaff;
      cursor: pointer;
      transition: 0.2s;
      margin-right: 0.3rem;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.5px;
    }

    .input-group button:hover {
      background: linear-gradient(105deg, #2f4180, #1a2c54);
      color: white;
      box-shadow: 0 0 8px #00ffff80;
      transform: scale(0.97);
    }

    /* response & code styling */
    .response-box {
      margin-top: 1.8rem;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 1.5rem;
      padding: 1rem;
      text-align: center;
      border: 1px dashed #2a6980;
      transition: all 0.2s;
    }

    .pair-code-display {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      background: #03060c;
      padding: 0.8rem;
      border-radius: 1rem;
      display: inline-block;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
    }

    .pair-code-display:hover {
      background: #0f172e;
      border-color: cyan;
    }

    .copy-tip {
      font-size: 0.7rem;
      color: #6c8dae;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }

    /* footer links (github + groups) */
    .footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(0, 200, 210, 0.25);
    }

    .footer-btn {
      background: rgba(20, 28, 45, 0.7);
      border-radius: 2rem;
      padding: 0.5rem 1.2rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: #b9d6ff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
      border: 0.5px solid #2b5a70;
    }

    .footer-btn i {
      font-size: 0.9rem;
    }

    .footer-btn:hover {
      background: #1e2d55;
      color: #ffffff;
      border-color: #5effe0;
      transform: translateY(-2px);
    }

    /* responsiveness */
    @media (max-width: 550px) {
      .zuk-card {
        padding: 1.5rem;
      }
      h1 {
        font-size: 2rem;
      }
      .input-group {
        flex-direction: column;
        background: transparent;
        gap: 0.8rem;
      }
      .input-group input {
        background: #0a1020;
        border-radius: 2rem;
        width: 100%;
        text-align: center;
      }
      .input-group button {
        width: 100%;
        justify-content: center;
      }
    }

    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #0ff;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .glow-text {
      color: #b3f0ff;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="zuk-card">
  <div class="zuk-header">
    <div class="brand-badge">
      <i class="fas fa-bolt"></i> ZUKO CORE <i class="fas fa-fire"></i>
    </div>
    <h1>ZUKO-MD</h1>
    <div class="tagline">⚡ session scanner • multi-device pairing ⚡</div>
  </div>

  <div class="session-area">
    <div class="info-badge">
      <i class="fas fa-qrcode"></i>
      <span>Enter your WhatsApp number (with country code) to receive pairing code</span>
    </div>

    <div class="input-group">
      <input type="tel" id="phoneNumber" placeholder="e.g., 2349079055953" autocomplete="off">
      <button id="pairButton">
        <i class="fas fa-link"></i> PAIR NOW
      </button>
    </div>

    <!-- dynamic response container -->
    <div id="pairResponse" class="response-box">
      <div style="color:#89b3d0; font-size:0.85rem;">
        <i class="fas fa-code-branch"></i> Ready • ZUKO pairing engine
      </div>
    </div>

    <div class="copy-tip" style="text-align:center; margin-top: 8px;">
      <i class="far fa-clock"></i> Code expires in 2 minutes — keep WhatsApp active
    </div>
  </div>

  <!-- GitHub & Social links (ZUKO-MD branding) -->
  <div class="footer-links">
    <a href="https://github.com/felixbassey467/ZUKO-MD" target="_blank" class="footer-btn">
      <i class="fab fa-github"></i> GitHub Repo
    </a>
    <a href="https://chat.whatsapp.com/DdZI3H1EFeOJs9TCIyVyXa" target="_blank" class="footer-btn">
      <i class="fab fa-whatsapp"></i> WhatsApp Group
    </a>
    <a href="https://chat.whatsapp.com/DdZI3H1EFeOJs9TCIyVyXa" target="_blank" class="footer-btn">
      <i class="fas fa-bullhorn"></i> WA Channel
    </a>
    <a href="https://wa.me/2349079055953" target="_blank" class="footer-btn">
      <i class="fas fa-headset"></i> Support
    </a>
  </div>
  <div style="text-align: center; margin-top: 1rem; font-size: 0.65rem; color: #3a6182;">
    <i class="fas fa-shield-alt"></i> ZUKO-MD • secured pairing system
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.0/axios.min.js"></script>
<script>
  // ZUKO-MD pairing handler (rebranded from RAHMANI-XMD)
  const phoneInput = document.getElementById('phoneNumber');
  const pairBtn = document.getElementById('pairButton');
  const responseDiv = document.getElementById('pairResponse');

  // Helper to format number for visual preview
  function formatPhonePreview(rawNumber) {
    let digits = rawNumber.replace(/[^0-9]/g, '');
    if (digits.length === 0) return '';
    let formatted = '+' + digits;
    if (digits.length >= 4 && digits.length <= 7) {
      formatted = '+' + digits.slice(0, 3) + ' ' + digits.slice(3);
    } else if (digits.length > 7) {
      formatted = '+' + digits.slice(0, 3) + ' ' + digits.slice(3, 6) + ' ' + digits.slice(6, 10);
    }
    return formatted;
  }

  // Copy to clipboard function
  async function copyToClipboard(codeText) {
    try {
      await navigator.clipboard.writeText(codeText);
      const copyElement = document.getElementById('copyCodeSpan');
      if (copyElement) {
        const originalHtml = copyElement.innerHTML;
        copyElement.innerHTML = '<i class="fas fa-check-circle"></i> COPIED!';
        copyElement.style.color = "#5affb0";
        setTimeout(() => {
          copyElement.innerHTML = originalHtml;
          copyElement.style.color = "#c0f2ff";
        }, 1500);
      } else {
        // fallback alert
        alert(`Code ${codeText} copied to clipboard`);
      }
    } catch (err) {
      alert("Tap to copy manually: " + codeText);
    }
  }

  // Display pairing code with interactive copy
  function showPairCode(code) {
    if (!code || code === "Service Unavailable" || code.includes("unavailable")) {
      responseDiv.innerHTML = `
        <div style="color:#ffa798; background:#2c1a1f; border-radius:1rem; padding:0.8rem;">
          <i class="fas fa-exclamation-triangle"></i> Failed to generate code.<br>
          <span style="font-size:0.8rem;">Make sure server is active or retry later.</span>
        </div>
      `;
      return;
    }
    responseDiv.innerHTML = `
      <div class="pair-code-display" id="codeBlock" onclick="window.copyToClipboardDirect('${code.replace(/'/g, "\\'")}')">
        <i class="fas fa-key"></i> <span id="copyCodeSpan" style="font-weight:bold; letter-spacing:1px; color:#bbf0ff;">CODE: ${code}</span>
        <i class="fas fa-copy" style="margin-left:8px; opacity:0.7;"></i>
      </div>
      <div class="copy-tip" style="margin-top:6px;">
        <i class="fas fa-mouse-pointer"></i> Click the box to copy pairing code
      </div>
    `;
    // attach event listener for the copy block
    const codeBlock = document.getElementById('codeBlock');
    if (codeBlock) {
      codeBlock.addEventListener('click', (e) => {
        e.stopPropagation();
        copyToClipboard(code);
      });
    }
  }

  // Expose global helper for inline onclick
  window.copyToClipboardDirect = function(code) {
    copyToClipboard(code);
  };

  function showLoading() {
    responseDiv.innerHTML = `
      <div style="display:flex; align-items:center; justify-content:center; gap:10px; color:#c3e2fc;">
        <div class="loader"></div> <span>Contacting ZUKO pairing server ...</span>
      </div>
    `;
  }

  function showError(msg) {
    responseDiv.innerHTML = `
      <div style="color:#ffbc9a; background:#26181c; border-radius:1rem; padding:0.8rem;">
        <i class="fas fa-ban"></i> ${msg}
      </div>
    `;
  }

  async function requestPairCode(numberRaw) {
    const cleanNumber = numberRaw.replace(/[^0-9]/g, '');
    if (!cleanNumber) {
      showError("⚠️ Please enter your WhatsApp number with country code.");
      return false;
    }
    if (cleanNumber.length < 10 || cleanNumber.length > 15) {
      showError("❌ Invalid phone number length. Include country code (e.g., 255 for Tanzania).");
      return false;
    }
    
    // Visual feedback: temporarily format the input for better UX
    phoneInput.value = formatPhonePreview(cleanNumber);
    
    showLoading();
    
    try {
      // endpoint: /code?number=123456789 (as per original RAHMANI style but rebranded)
      // using relative path for same-origin pairing (compatible with your backend)
      const { data } = await axios.get(`/code?number=${cleanNumber}`, {
        timeout: 15000,
        headers: { 'Accept': 'application/json' }
      });
      
      let receivedCode = data.code;
      if (!receivedCode && data.pairCode) receivedCode = data.pairCode;
      if (!receivedCode && data.pairingCode) receivedCode = data.pairingCode;
      if (!receivedCode && typeof data === 'string') receivedCode = data;
      
      if (receivedCode && receivedCode !== "Service Unavailable" && !receivedCode.includes("error")) {
        showPairCode(receivedCode);
        return true;
      } else {
        let errorMsg = receivedCode || "No code received from server.";
        if (errorMsg === "Service Unavailable") errorMsg = "Pairing service temporarily unavailable. Try again.";
        showError(`🔐 ${errorMsg}`);
        return false;
      }
    } catch (err) {
      console.error("Pairing request error:", err);
      let errorText = "Network error or server unreachable.";
      if (err.response && err.response.data && err.response.data.error) errorText = err.response.data.error;
      else if (err.message) errorText = err.message;
      showError(`⚠️ Pairing failed: ${errorText}. Make sure the backend is running.`);
      return false;
    }
  }

  // main event
  pairBtn.addEventListener('click', async (e) => {
    e.preventDefault();
    let rawNumber = phoneInput.value.trim();
    if (!rawNumber) {
      showError("📱 Enter your WhatsApp number with country code (e.g., 255693629079)");
      phoneInput.focus();
      return;
    }
    await requestPairCode(rawNumber);
  });

  // optional: pressing enter in input triggers pairing
  phoneInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      pairBtn.click();
    }
  });

  // small initial message style - welcome
  responseDiv.innerHTML = `
    <div style="color:#97b9da; font-size:0.85rem;">
      <i class="fas fa-sync-alt"></i> ZUKO-MD ready • Insert number → get pairing code
    </div>
  `;
</script>
</body>
</html>
