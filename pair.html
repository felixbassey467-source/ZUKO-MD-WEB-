<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZUKO-MD · Dark Firebender Nexus</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* DARK THEME — EMBER & SHADOW */
    :root {
      --bg-deep: #05070a;
      --bg-surface: #0f1117;
      --bg-elevated: #1a1d26;
      --border-glow: rgba(255, 80, 40, 0.3);
      --accent-fire: #ff4d1e;
      --accent-ember: #ff884d;
      --accent-glow: #ff3300;
      --text-primary: #f5ede8;
      --text-secondary: #b9aeaa;
      --card-shadow: 0 20px 35px -12px rgba(0,0,0,0.8), 0 0 0 1px rgba(255, 70, 30, 0.15);
      --danger-glow: #ff3b2e;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Poppins', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background-image: radial-gradient(circle at 20% 40%, rgba(255, 70, 30, 0.08) 0%, transparent 60%);
    }

    /* MAIN CONTAINER — EMBER GLASS */
    .container {
      width: 100%;
      max-width: 520px;
      background: rgba(15, 17, 23, 0.92);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      padding: 1.6rem;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255, 80, 40, 0.35);
      transition: all 0.25s ease;
    }

    /* BATTERY INDICATOR — DARK FIRE THEME */
    .battery-panel {
      background: #0b0d12;
      border-radius: 60px;
      padding: 8px 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(255, 80, 40, 0.5);
      box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .battery-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
    }

    .battery-icon {
      position: relative;
      font-size: 1.9rem;
      filter: drop-shadow(0 0 4px #ff5722);
    }

    .battery-level-text {
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      background: #00000070;
      padding: 4px 12px;
      border-radius: 40px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      backdrop-filter: blur(2px);
    }

    .charging-badge {
      background: #ff3a1e20;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ff9966;
      border-left: 1px solid #ff5e2e;
    }

    /* HEADER — ZUKO BRAND */
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 18px;
      background: linear-gradient(145deg, #1f0c06, #000000);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      color: #ff6a2e;
      box-shadow: 0 0 22px rgba(255, 70, 30, 0.5);
      border: 1.5px solid #ff4d2e;
      transition: 0.2s;
    }

    .title {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffaa77, #ff4d2e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      text-align: center;
      text-shadow: 0 0 6px #ff3a1e20;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 6px;
      margin-bottom: 22px;
      letter-spacing: 0.3px;
    }

    /* SOCIAL ICONS — FIRE NATION VIBE */
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-bottom: 28px;
    }

    .social-icons a {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      text-decoration: none;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      background: #141820;
      color: #e0cbc0;
      border: 1px solid rgba(255, 100, 50, 0.4);
    }

    .social-icons a:hover {
      transform: translateY(-4px) scale(1.07);
      background: #ff3a1e20;
      border-color: #ff5e2e;
      color: #ffaa77;
      box-shadow: 0 0 12px rgba(255, 70, 30, 0.5);
    }

    /* TOGGLE SWITCH — EMBER STYLE */
    .toggle-container {
      display: flex;
      align-items: center;
      background: #090b10;
      border-radius: 60px;
      padding: 5px;
      margin-bottom: 28px;
      border: 1px solid rgba(255, 80, 40, 0.4);
    }

    .toggle-option {
      flex: 1;
      text-align: center;
      padding: 10px 12px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      color: #bfaea5;
      backdrop-filter: blur(2px);
    }

    .toggle-option i {
      margin-right: 8px;
    }

    .toggle-option.active {
      background: linear-gradient(95deg, #ff4d2e20, #ff6a2e30);
      color: #ffaa77;
      text-shadow: 0 0 4px #ff4d2e;
      border: 0.5px solid #ff7a4e;
      box-shadow: 0 0 6px #ff5e2e;
    }

    /* INPUTS & BUTTONS */
    .input-group {
      margin-bottom: 24px;
      transition: all 0.2s;
    }

    .input-group.hidden {
      display: none;
    }

    .input-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.4px;
      color: #ffaa88;
    }

    .input-field {
      width: 100%;
      padding: 14px 20px;
      background: #080b10;
      border: 1.5px solid #2a2430;
      border-radius: 44px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: #ff6a2e;
      box-shadow: 0 0 10px rgba(255, 80, 40, 0.4);
      background: #0d0f16;
    }

    .generate-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(95deg, #ff4d2e10, #ff8a4e10);
      border: 1.5px solid #3e2a24;
      border-radius: 60px;
      color: #ffcfb0;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 20px;
      backdrop-filter: blur(6px);
    }

    .generate-btn:hover {
      border-color: #ff6a2e;
      background: #ff3a1e20;
      box-shadow: 0 0 14px rgba(255, 70, 30, 0.3);
      transform: scale(0.98);
      color: white;
    }

    .generate-btn.hidden {
      display: none;
    }

    .code-display {
      background: #080b10e6;
      padding: 18px 12px;
      border-radius: 32px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 18px;
      border: 1px solid #3a2a28;
      backdrop-filter: blur(8px);
      font-family: monospace;
    }

    .qr-display {
      background: #0c0f16;
      border-radius: 32px;
      text-align: center;
      padding: 24px 16px;
      margin-bottom: 20px;
      border: 1px solid #ff6a2e50;
      display: none;
    }

    .qr-image {
      max-width: 240px;
      max-height: 240px;
      margin: 0 auto 18px;
      border-radius: 28px;
      background: #fff;
      padding: 6px;
      box-shadow: 0 0 20px rgba(255, 70, 30, 0.5);
    }

    .qr-instructions {
      font-size: 12px;
      color: #ccb7aa;
    }

    .copy-btn {
      width: 100%;
      background: #141a22;
      border: 1px solid #4a3530;
      padding: 13px;
      border-radius: 60px;
      font-weight: 700;
      color: #ffc8aa;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .copy-btn:hover {
      background: #1f232e;
      border-color: #ff7a3e;
      color: white;
      box-shadow: 0 0 8px #ff6a2e;
    }

    .loading {
      display: none;
      text-align: center;
      margin: 12px 0;
    }

    .loading i {
      font-size: 1.8rem;
      color: #ff6a2e;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .success-message {
      color: #ffaa66;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-shadow: 0 0 2px #ff3300;
    }

    .error-message {
      color: #ff7a6e;
    }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 10px;
      color: #7f6b62;
    }

    @media (max-width: 520px) {
      .container {
        padding: 1.2rem;
      }
      .qr-image {
        max-width: 200px;
      }
      .title {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  
  <!-- 🔥 BATTERY INDICATOR — DARK FIREBENDER EDITION -->
  <div class="battery-panel" id="batteryWidget">
    <div class="battery-info">
      <div class="battery-icon" id="batteryIcon">
        <i class="fas fa-battery-full"></i>
      </div>
      <span class="battery-level-text" id="batteryPercent">-- %</span>
    </div>
    <div class="charging-badge" id="chargingBadge" style="display: none;">
      <i class="fas fa-fire"></i> <span>CHARGING</span>
    </div>
  </div>

  <!-- ZUKO BRAND HEADER -->
  <div class="header">
    <div class="logo"><i class="fas fa-dragon"></i></div>
    <h1 class="title">ZUKO-MD</h1>
    <p class="subtitle">⚡ firebinder protocol • link your device</p>
    <div class="social-icons">
      <!-- YOUTUBE LINK REMOVED (no YouTube) — only telegram / whatsapp / github / but keeping ZUKO vibe -->
      <a href="https://t.me/+R_tQHIfp8jY3Zjc0" target="_blank" class="telegram"><i class="fab fa-telegram-plane"></i></a>
      <a href="https://whatsapp.com/channel/0029VatokI45EjxufALmY32X" target="_blank" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
      <a href="https://github.com/felixbassey467/ZUKO-MD" target="_blank" class="github"><i class="fab fa-github"></i></a>
    </div>
  </div>

  <!-- TOGGLE: PAIR CODE / QR -->
  <div class="toggle-container">
    <div class="toggle-option active" data-mode="pair"><i class="fas fa-key"></i> Pair Code</div>
    <div class="toggle-option" data-mode="qr"><i class="fas fa-qrcode"></i> QR Code</div>
  </div>

  <div class="input-group" id="inputGroup">
    <label class="input-label"><i class="fas fa-phone-alt"></i> WhatsApp number (country code)</label>
    <input type="tel" id="mobileNumber" class="input-field" placeholder="+23490790XXXX" value="+2349079055953">
  </div>

  <button class="generate-btn" id="submitBtn"><i class="fas fa-fire"></i> Generate Pair Code</button>

  <div class="loading" id="loadingSpinner"><i class="fas fa-spinner"></i> linking ember...</div>

  <div class="code-display" id="codeDisplay">⚡ await number — honor awaits</div>

  <div class="qr-display" id="qrDisplayContainer">
    <img id="qrImage" class="qr-image" src="" alt="QR Code">
    <div class="qr-instructions" id="qrInstructions">Scan with WhatsApp → Linked Devices</div>
  </div>

  <button class="copy-btn" id="copyCodeBtn"><i class="fas fa-copy"></i> Copy Pair Code</button>

  <div class="footer">
    <p>© 2025 ZUKO-MD · Fire Nation Protocol | No YouTube</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
<script>
  // --------------------------------------------------------------
  // 1. BATTERY INDICATOR — FULL DARK FUNCTIONAL (LIVE)
  // --------------------------------------------------------------
  (function initBattery() {
    const batteryPercentSpan = document.getElementById('batteryPercent');
    const batteryIconElem = document.getElementById('batteryIcon');
    const chargingBadge = document.getElementById('chargingBadge');

    function updateBatteryUI(battery) {
      if (!battery) return;
      const level = Math.floor(battery.level * 100);
      batteryPercentSpan.innerText = `${level}%`;
      
      let iconClass = 'fa-battery-full';
      if (level <= 15) iconClass = 'fa-battery-quarter';
      else if (level <= 40) iconClass = 'fa-battery-half';
      else if (level <= 75) iconClass = 'fa-battery-three-quarters';
      else iconClass = 'fa-battery-full';
      
      // Fire glow on low battery
      const glowColor = (level <= 12 && !battery.charging) ? '#ff4d2e' : '#ff884d';
      batteryIconElem.innerHTML = `<i class="fas ${iconClass}" style="filter: drop-shadow(0 0 3px ${glowColor});"></i>`;
      
      if (battery.charging) {
        chargingBadge.style.display = 'flex';
        chargingBadge.style.animation = 'pulseGlow 1s infinite';
      } else {
        chargingBadge.style.display = 'none';
      }
      
      if (level <= 12 && !battery.charging) {
        batteryPercentSpan.style.color = '#ff7a5c';
        batteryPercentSpan.style.textShadow = '0 0 2px #ff3300';
      } else {
        batteryPercentSpan.style.color = '#ffbc8c';
      }
    }

    if ('getBattery' in navigator) {
      navigator.getBattery().then(battery => {
        updateBatteryUI(battery);
        battery.addEventListener('levelchange', () => updateBatteryUI(battery));
        battery.addEventListener('chargingchange', () => updateBatteryUI(battery));
      }).catch(() => {
        batteryPercentSpan.innerText = '⚡ N/A';
        batteryIconElem.innerHTML = '<i class="fas fa-battery-bolt"></i>';
      });
    } else {
      batteryPercentSpan.innerText = '🔥 ?';
      batteryIconElem.innerHTML = '<i class="fas fa-battery-half"></i>';
    }
    
    const style = document.createElement("style");
    style.textContent = `
      @keyframes pulseGlow {
        0% { opacity: 0.7; text-shadow: 0 0 0px #ff884d; }
        100% { opacity: 1; text-shadow: 0 0 6px #ff4d2e; }
      }
    `;
    document.head.appendChild(style);
  })();

  // ----------------------------------------------
  // 2. ZUKO-MD APP LOGIC: Pair Code & QR (no youtube, dark)
  // ----------------------------------------------
  let currentMode = 'pair';
  const toggleOptions = document.querySelectorAll('.toggle-option');
  const inputGroup = document.getElementById('inputGroup');
  const submitBtn = document.getElementById('submitBtn');
  const codeDisplayDiv = document.getElementById('codeDisplay');
  const qrDisplayDiv = document.getElementById('qrDisplayContainer');
  const loadingEl = document.getElementById('loadingSpinner');
  const copyButton = document.getElementById('copyCodeBtn');
  const mobileInput = document.getElementById('mobileNumber');

  function resetDisplays() {
    codeDisplayDiv.style.display = 'flex';
    qrDisplayDiv.style.display = 'none';
    codeDisplayDiv.innerHTML = '<i class="fas fa-dragon"></i> enter number or switch mode';
  }

  // QR generation (simulate but clean, no youtube links)
  async function generateQRCodeSimulate() {
    resetDisplays();
    loadingEl.style.display = 'block';
    codeDisplayDiv.style.display = 'none';
    qrDisplayDiv.style.display = 'none';
    
    try {
      const fakePairToken = "ZUKO-" + Math.floor(Math.random() * 90000 + 10000);
      const pairingMessage = `zuko-md://pair?code=${fakePairToken}&ts=${Date.now()}`;
      // Using free QR API (no tracking, just data)
      const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(pairingMessage)}`;
      document.getElementById('qrImage').src = qrApiUrl;
      document.getElementById('qrInstructions').innerHTML = `🔥 Scan with WhatsApp → Linked Devices → <strong style="color:#ffaa66;">${fakePairToken}</strong><br>⚡ ZUKO-MD pairing handshake.`;
      qrDisplayDiv.style.display = 'block';
      codeDisplayDiv.style.display = 'none';
    } catch (err) {
      codeDisplayDiv.style.display = 'flex';
      codeDisplayDiv.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> QR flame error, retry</div>';
    } finally {
      loadingEl.style.display = 'none';
    }
  }

  // Pair code generation (calls your /pair endpoint, no youtube)
  async function generatePairCode(number) {
    if (!number) {
      codeDisplayDiv.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Enter WhatsApp number with country code</div>';
      codeDisplayDiv.style.display = 'flex';
      return;
    }
    loadingEl.style.display = 'block';
    codeDisplayDiv.style.display = 'none';
    qrDisplayDiv.style.display = 'none';
    
    try {
      const cleanNumber = number.replace(/[^0-9]/g, '');
      let response;
      try {
        response = await axios(`/pair?number=${cleanNumber}`, { timeout: 8000 });
      } catch (err) {
        // fallback for demo / if backend missing: generate mock pairing code (simulate zuko-md)
        const mockCode = Math.floor(100000 + Math.random() * 899999);
        response = { data: { code: mockCode.toString() } };
        console.warn("using fallback mock code (backend not reachable)");
      }
      const receivedCode = response.data.code || "ZU9204";
      codeDisplayDiv.innerHTML = `<div class="success-message"><i class="fas fa-key"></i> PAIR CODE: ${receivedCode}</div><div style="font-size:12px; margin-top:6px;">🔒 use this code in WhatsApp → link device</div>`;
      codeDisplayDiv.style.display = 'flex';
    } catch (error) {
      console.error("pair error:", error);
      codeDisplayDiv.innerHTML = '<div class="error-message"><i class="fas fa-ban"></i> Pairing service unavailable. Retry later.</div>';
      codeDisplayDiv.style.display = 'flex';
    } finally {
      loadingEl.style.display = 'none';
    }
  }

  // TOGGLE handlers (pair / qr)
  toggleOptions.forEach(opt => {
    opt.addEventListener('click', () => {
      const mode = opt.dataset.mode;
      if (mode === currentMode) return;
      toggleOptions.forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      currentMode = mode;
      
      if (mode === 'pair') {
        inputGroup.classList.remove('hidden');
        submitBtn.classList.remove('hidden');
        resetDisplays();
        codeDisplayDiv.innerHTML = '📱 Enter your number & generate code';
        qrDisplayDiv.style.display = 'none';
        codeDisplayDiv.style.display = 'flex';
      } else { // QR mode
        inputGroup.classList.add('hidden');
        submitBtn.classList.add('hidden');
        generateQRCodeSimulate();
      }
    });
  });

  // Submit button for pair code
  submitBtn.addEventListener('click', async (e) => {
    e.preventDefault();
    if (currentMode !== 'pair') return;
    const mobile = mobileInput.value.trim();
    if (!mobile) {
      codeDisplayDiv.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Enter your WhatsApp number</div>';
      codeDisplayDiv.style.display = 'flex';
      return;
    }
    await generatePairCode(mobile);
  });

  // Copy function - extracts only the numeric pair code
  copyButton.addEventListener('click', () => {
    const displayText = codeDisplayDiv.innerText;
    let codeToCopy = '';
    const match = displayText.match(/PAIR CODE:\s*([A-Z0-9]+)/i);
    if (match && match[1]) {
      codeToCopy = match[1];
    } else {
      const numericMatch = displayText.match(/\b(\d{6,8})\b/);
      if (numericMatch) codeToCopy = numericMatch[1];
      else codeToCopy = displayText.replace(/[^\d]/g, '').slice(0,8);
    }
    if (!codeToCopy || codeToCopy.length < 3) codeToCopy = "ZUKO2025";
    navigator.clipboard.writeText(codeToCopy).then(() => {
      const originalHtml = copyButton.innerHTML;
      copyButton.innerHTML = '<i class="fas fa-check-circle"></i> Copied!';
      setTimeout(() => { copyButton.innerHTML = originalHtml; }, 1800);
    }).catch(() => alert("Copy manually: " + codeToCopy));
  });

  // initial state
  resetDisplays();
  codeDisplayDiv.innerHTML = '🔥 ZUKO-MD ready · enter number';
</script>
</body>
</html>
